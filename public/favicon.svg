<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#2d0052"/>

  <!-- Head -->
  <circle cx="12" cy="6" r="2.3" fill="white"/>

  <!-- Body (slight forward lean) -->
  <line x1="12" y1="8.3" x2="13" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Left arm raised -->
  <line x1="12" y1="11.5" x2="6" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right arm extended -->
  <line x1="12" y1="11.5" x2="19" y2="14.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tutu -->
  <path d="M10 16 Q13 19 16 16" fill="#db2777"/>

  <!-- Standing leg (en pointe) -->
  <line x1="13" y1="16" x2="11" y2="23.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="11" y1="23.5" x2="10.5" y2="26.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Arabesque leg extending right -->
  <line x1="13" y1="16" x2="21.5" y2="11.5" stroke="#db2777" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="21.5" y1="11.5" x2="27" y2="9" stroke="#db2777" stroke-width="1.4" stroke-linecap="round"/>
</svg>
